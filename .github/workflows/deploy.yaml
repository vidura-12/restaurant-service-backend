name: CI/CD with DevSecOps for Restaurant Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code (Corrected action)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # Setup .NET (Corrected action)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore dependencies
      - name: Restore .NET dependencies
        run: dotnet restore RestaurantManagementService/RestaurantManagementService.csproj

      # SonarCloud Scan (SAST)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=vidura-12_restaurant-service-backend
            -Dsonar.organization=vidura-12
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=RestaurantManagementService

      # Snyk SCA Scan (Using the specialized .NET action)
      - name: Snyk Open Source Scan
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=RestaurantManagementService/RestaurantManagementService.csproj

      # Clone Kubernetes Config Repo (Corrected action)
      - name: Clone Kubernetes Config Repository
        uses: actions/checkout@v4
        with:
          repository: Deliveroo-System/ds-project-kubernetes
          token: ${{ secrets.GH_PAT }} # Best to use a Personal Access Token for private/external repos
          path: kubernetes

      # Docker Login
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build Docker Image
      - name: Build Docker image
        run: docker build -f RestaurantManagementService/Dockerfile -t vidura12/deliveroo:restaurant-service-latest RestaurantManagementService

      # Push Docker Image
      - name: Push Docker image to Docker Hub
        run: docker push vidura12/deliveroo:restaurant-service-latest
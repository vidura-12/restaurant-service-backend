name: CI/CD with DevSecOps for Restaurant Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout repository
        uses: snyk/actions/dotnet@v3
        with:
          fetch-depth: 0 

      # -------------------------------
      # Setup .NET (REQUIRED)
      # -------------------------------
      - name: Setup .NET
        uses: snyk/actions/dotnet@v3
        with:
          dotnet-version: 8.0.x   # change if your project uses 6/7

      # -------------------------------
      # Restore dependencies (REQUIRED)
      # -------------------------------
      - name: Restore .NET dependencies
        run: dotnet restore RestaurantManagementService/RestaurantManagementService.csproj

      # -------------------------------
      # SonarCloud Scan (SAST)
      # -------------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=vidura-12_restaurant-service-backend
            -Dsonar.organization=vidura-12
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=RestaurantManagementService

      # -------------------------------
      # Snyk SCA Scan (FIXED VERSION)
      # -------------------------------
      - name: Snyk Open Source Scan
        uses: snyk/actions/dotnet@v3
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=RestaurantManagementService/RestaurantManagementService.csproj

      # -------------------------------
      # Clone Kubernetes Config Repo
      # -------------------------------
      - name: Clone Kubernetes Config Repository
        uses: snyk/actions/dotnet@v3
        with:
          repository: Deliveroo-System/ds-project-kubernetes
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          path: kubernetes

      # -------------------------------
      # Docker Login
      # -------------------------------
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -------------------------------
      # Build Docker Image
      # -------------------------------
      - name: Build Docker image
        run: docker build -f RestaurantManagementService/Dockerfile -t vidura12/deliveroo:restaurant-service-latest RestaurantManagementService

      # -------------------------------
      # Push Docker Image
      # -------------------------------
      - name: Push Docker image to Docker Hub
        run: docker push vidura12/deliveroo:restaurant-service-latest
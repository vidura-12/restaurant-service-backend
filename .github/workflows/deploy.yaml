name: CI/CD with DevSecOps for Restaurant Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required for SonarCloud to analyze git history

      # --- DEVSECOPS: SAST SCAN (SonarCloud) ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # --- DEVSECOPS: SCA SCAN (Snyk) ---
      - name: Snyk Open Source Analysis (SCA)
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # Step 2: Clone Kubernetes Config Repository (Optional)
      - name: Clone Kubernetes Config Repository
        uses: actions/checkout@v3
        with:
          repository: 'Deliveroo-System/ds-project-kubernetes'
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          path: kubernetes

      # Step 3: Log in to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 4: Build the Docker image
      - name: Build Docker image
        run: docker build -f RestaurantManagementService/Dockerfile -t vidura12/deliveroo:restaurant-service-latest RestaurantManagementService

      # Step 5: Push the Docker image to Docker Hub
      # This step only runs if SonarCloud and Snyk tests pass!
      - name: Push Docker image to Docker Hub
        run: docker push vidura12/deliveroo:restaurant-service-latest
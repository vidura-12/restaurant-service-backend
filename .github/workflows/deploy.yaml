name: CI/CD with DevSecOps for Restaurant Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # --- DEVSECOPS: SAST SCAN (SonarCloud) ---
      # IMPORTANT: Go to SonarCloud.io and manually click "Analyze new project" 
      # for this repo first to "activate" these keys.
      # --- DEVSECOPS: SAST SCAN (SonarCloud) ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=vidura-12_restaurant-service-backend
            -Dsonar.organization=vidura-12
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=RestaurantManagementService
            
      # Restore dependencies (REQUIRED)
      - name: Restore .NET dependencies
        run: dotnet restore RestaurantManagementService/RestaurantManagementService.csproj

      # --- DEVSECOPS: SCA SCAN (Snyk) ---
      # Uses the Org slug from your URL: vidura-12
      - name: Snyk Open Source Analysis (SCA)
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=RestaurantManagementService/RestaurantManagementService.csproj --org=vidura-12

      # Step 2: Clone Kubernetes Config Repository
      - name: Clone Kubernetes Config Repository
        uses: actions/checkout@v4
        with:
          repository: 'Deliveroo-System/ds-project-kubernetes'
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          path: kubernetes

      # Step 3: Log in to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 4: Build the Docker image
      - name: Build Docker image
        run: docker build -f RestaurantManagementService/Dockerfile -t vidura12/deliveroo:restaurant-service-latest RestaurantManagementService

      # Step 5: Push the Docker image to Docker Hub
      - name: Push Docker image to Docker Hub
        run: docker push vidura12/deliveroo:restaurant-service-latest